server {
    listen 80;
    listen [::]:80;
    server_name stream.votreradio.example;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stream.votreradio.example;

    root /var/www/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/stream.votreradio.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.votreradio.example/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /stream {
        proxy_pass http://127.0.0.1:8000/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 1h;
    }

    location /stream.mp3 {
        proxy_pass http://127.0.0.1:8000/stream.mp3;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 1h;
    }

    location = /nowplaying.json {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        if ($request_method = OPTIONS) { return 204; }
        try_files /nowplaying.json =404;
        default_type application/json;
    }

    location = /current-show.json {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        if ($request_method = OPTIONS) { return 204; }
        try_files /current-show.json =404;
        default_type application/json;
    }

    location = /listeners.json {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        if ($request_method = OPTIONS) { return 204; }
        try_files /listeners.json =404;
        default_type application/json;
    }

    location /history/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        if ($request_method = OPTIONS) { return 204; }
        alias /var/www/html/history/;
        autoindex on;
    }

    location / {
        return 403;
    }
}

